site_name: Basic Mathematics — Student Problem Notebook
site_description: A structured problem-solving notebook for the Basic Mathematics course.
site_url: https://dchorazkiewicz.github.io/Math_Problems_Repo/
repo_url: https://github.com/dchorazkiewicz/Math_Problems_Repo
repo_name: dchorazkiewicz/Math_Problems_Repo

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search

nav:
  - Home: index.md
  - Start Here with AI: start_here_with_ai.md
  - Getting Started: getting_started.md
  - Source Material: source_material.md
  - Note Standard: note_standard.md
  - AI Workflow: ai_workflow.md
